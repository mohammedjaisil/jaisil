name: Supabase Keep-Alive Ping

on:
  schedule:
    # Runs every 3 days at 00:00 UTC (well within the 7-day sleep threshold)
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

env:
  SUPABASE_URL: https://dvillsmhgccefhstyibd.supabase.co
  SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2aWxsc21oZ2NjZWZoc3R5aWJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNDM2NDksImV4cCI6MjA4ODcxOTY0OX0.dP6ytwUgvtActricTu8rumtE9hPEI0Y0MRmftn-98pU

jobs:
  ping:
    name: Ping Supabase to prevent sleep
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase at $(date)..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ env.SUPABASE_URL }}/rest/v1/products?select=id&limit=1" \
            -H "apikey: ${{ env.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ env.SUPABASE_ANON_KEY }}")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "✅ Supabase is awake and responding."
          else
            echo "⚠️ Unexpected status code: $STATUS"
            exit 1
          fi
